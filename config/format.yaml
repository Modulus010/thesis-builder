# 东北大学本科毕业设计（论文）格式配置

# 页面设置
page:
  width: 21.0      # A4宽度(cm)
  height: 29.7     # A4高度(cm)
  margin_top: 2.5
  margin_bottom: 2.5
  margin_left: 3.0
  margin_right: 2.5
  header_distance: 1.5
  footer_distance: 1.5

# 布局常量
layout:
  first_line_indent_pt: 24
  cover_line_spacing_pt: 32
  chapter_before_lines: 80    # 章标题段前0.8行
  chapter_after_lines: 50     # 章标题段后0.5行
  section_before_lines: 50    # 节标题段前0.5行
  section_after_lines: 50     # 节标题段后0.5行
  subsection_before_lines: 50  # 小节标题段前0.5行
  subsection_after_lines: 50   # 小节标题段后0.5行
  caption_before_lines: 50    # 图题/表题段前0.5行
  caption_after_lines: 50     # 图题/表题段后0.5行
  line_spacing_pt: 23       # 正文固定行距23磅

# 字体设置
fonts:
  # --- 封面 ---
  cover_id:
    name: 黑体
    size: 10.5     # 五号
  cover_school_name:
    name: 宋体
    size: 26       # 一号
    bold: true
  cover_first_title:
    name: 宋体
    size: 15       # 小三号
    bold: true
  cover_thesis_title:
    name: 黑体
    size: 22       # 二号
    bold: false
  cover_english_title:
    name: Times New Roman
    size: 22       # 二号
    bold: true
  cover_info:
    name: 宋体
    size: 15       # 小三号
  cover_date:
    name: 宋体
    size: 16       # 三号

  cover_english_detail:
    name: Times New Roman
    size: 15
  cover_english_university:
    name: Times New Roman
    size: 16
  cover_english_date:
    name: Times New Roman
    size: 16

  code:
    name: Courier New
    size: 12       # 小四号（格式检查要求正文统一字号）

  # --- 学术声明 ---
  declaration_title:
    name: 宋体
    size: 22       # 二号
    bold: true
  declaration_body:
    name: 宋体
    size: 14       # 四号

  # --- 正文章标题 ---
  chapter_title:
    name: 黑体
    size: 18       # 小二号
    bold: false

  # 节一级标题 (X.1)
  section_title_1:
    name: 黑体
    size: 14       # 四号
    bold: false

  # 节二级标题 (X.1.1)
  section_title_2:
    name: 黑体
    size: 12       # 小四号
    bold: false

  # 节三级标题 (X.1.1.1)
  section_title_3:
    name: 黑体
    size: 12       # 小四号
    bold: false

  # 正文
  body:
    name: 宋体
    size: 12       # 小四号

  # 中文摘要标题
  abstract_title:
    name: 黑体
    size: 18       # 小二号
    bold: true

  # 中文摘要内容
  abstract_body:
    name: 宋体
    size: 12       # 小四号

  # 中文关键词标题
  keywords_title:
    name: 黑体
    size: 12       # 小四号
    bold: false

  # 中文关键词
  keywords:
    name: 宋体
    size: 12       # 小四号

  # 英文摘要标题
  english_abstract_title:
    name: Times New Roman
    size: 18       # 小二号
    bold: true

  # 英文摘要内容
  english_abstract_body:
    name: Times New Roman
    size: 12       # 小四号

  # 英文关键词标题
  english_keywords_title:
    name: Times New Roman
    size: 12       # 小四号
    bold: true

  # 英文关键词
  english_keywords:
    name: Times New Roman
    size: 12       # 小四号

  # 目录标题
  toc_title:
    name: 黑体
    size: 18       # 小二号
    bold: true

  # 目录章标题
  toc_chapter:
    name: 黑体
    size: 14       # 四号

  # 目录其他内容
  toc_other:
    name: 宋体
    size: 12       # 小四号

  # 参考文献标题
  references_title:
    name: 黑体
    size: 18       # 小二号
    bold: false

  # 致谢标题
  acknowledgments_title:
    name: 黑体
    size: 18       # 小二号
    bold: false

  # 附录标题
  appendix_title:
    name: 黑体
    size: 18       # 小二号
    bold: false

  # 参考文献内容
  references_body:
    name: 宋体
    size: 12       # 小四号

  # 图标题
  figure_caption:
    name: 宋体
    size: 10.5     # 五号

  # 表标题
  table_caption:
    name: 宋体
    size: 10.5     # 五号

  # 页码
  page_number:
    name: Times New Roman
    size: 10.5     # 五号

  # 页眉页脚
  header_footer:
    name: 宋体
    size: 10.5     # 五号

# 内容要求
content:
  metadata:
    title_max_chars: 24

  abstract:
    min_chars: 400
    max_chars: 700
    keywords_min: 3
    keywords_max: 5

  references:
    min_count: 40

  chapters:
    intro:
      name: 绪论
      max_ratio: 0.1
      forbid_summary: true
    tech:
      name: 相关技术
      max_ratio: 0.15
      alternatives: [关键技术]
    analysis:
      name: 需求分析
      ratio: 0.15
      alternatives: [系统分析]
    design:
      name: 系统设计
      min_ratio: 0.3
    impl:
      name: 系统实现
      min_ratio: 0.2
    test:
      name: 系统测试
      ratio: 0.07
    conclusion:
      name: 总结与展望
      forbid_summary: true

  chapter_summary:
    min_length: 80

  code_max_lines: 60
  chart_density:
    max_consecutive: 3

# 必需章节
required_sections:
  - 绪论
  - 需求分析
  - 系统设计
  - 系统实现
  - 系统测试
  - 总结与展望
  - 参考文献
  - 致谢

# 图表路径
figures_path: figures

# 题注设置
caption:
  native: true
